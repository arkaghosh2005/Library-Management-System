<!-- Sidebar Component - Include this in other templates -->
<style>
    .sidebar {
        width: 250px;
        height: 100vh;
        background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%);
        position: fixed;
        left: 0;
        top: 0;
        padding: 20px 0;
        box-shadow: 2px 0 10px rgba(0,0,0,0.2);
    }
    
    .sidebar-header {
        text-align: center;
        padding: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        margin-bottom: 20px;
    }
    
    .sidebar-header h2 {
        color: #fff;
        font-size: 1.5rem;
        margin: 0;
    }
    
    .sidebar-header span {
        color: #3498db;
    }
    
    .sidebar-menu {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    
    .sidebar-menu li {
        margin: 5px 15px;
    }
    
    .sidebar-menu a {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        color: #bdc3c7;
        text-decoration: none;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    
    .sidebar-menu a:hover,
    .sidebar-menu a.active {
        background: rgba(52, 152, 219, 0.2);
        color: #fff;
    }
    
    .sidebar-menu a.active {
        background: #3498db;
    }
    
    .menu-icon {
        width: 20px;
        margin-right: 12px;
        text-align: center;
    }
</style>

<nav class="sidebar">
    <div class="sidebar-header">
        <h2><span>Library Management System</span></h2>
    </div>
    
    <ul class="sidebar-menu">
        <li>
            <a href="{% url 'dashboard' %}" class="{% if active_page == 'dashboard' %}active{% endif %}">
                <span class="menu-icon">🏠</span>
                Dashboard
            </a>
        </li>
        <li>
            <a href="{% url 'user_table' %}" class="{% if active_page == 'users' %}active{% endif %}">
                <span class="menu-icon">👥</span>
                Users
            </a>
        </li>
        <li>
            <a href="{% url 'book_table' %}" class="{% if active_page == 'books' %}active{% endif %}">
                <span class="menu-icon">📖</span>
                Books
            </a>
        </li>
        <li>
            <a href="{% url 'records_open' %}" class="{% if active_page == 'records_open' %}active{% endif %}">
                <span class="menu-icon">📋</span>
                Records
            </a>
        </li>
    </ul>
</nav>
